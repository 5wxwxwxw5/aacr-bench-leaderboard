name: Publish Leaderboard

on:
  push:
    branches: [main]
    paths:
      - "leaderboard/data/**"
      - "leaderboard/site/**"
      - "evaluation/aggregate.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Aggregate metrics
        run: python evaluation/aggregate.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: leaderboard/site

      - id: deployment
        uses: actions/deploy-pages@v4
