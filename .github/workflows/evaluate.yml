name: Evaluate Submission

# 仅当 maintainer 给 PR 打上 ready-to-eval 标签时触发。
# 用 pull_request_target 以便访问仓库 secrets（JUDGE_*），并用 environment 保护。
#
# 防篡改设计：
# - 评测脚本 / benchmark 一律从 base 分支（main）检出，用户在 PR 里对
#   evaluation/ benchmark/ 的任何改动都不会被执行；只有 submissions/ 数据取自 PR。
# - 复算结果 leaderboard/data/<id>.json 由本 Action 用 main 的可信脚本重算后，
#   commit 回 PR 分支，随 PR 一起合并。即便用户在 PR 里自带该文件也会被真实结果覆盖。
on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate:
    if: github.event.label.name == 'ready-to-eval'
    runs-on: ubuntu-latest
    environment: evaluation      # 在此 environment 配置 JUDGE_* secrets 并限定审批者
    steps:
      # 1) 检出 base 分支（main）的可信代码：评测脚本 + benchmark（只读，不写回）。
      - name: Checkout trusted scripts (base branch)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: main-src

      # 2) 检出 PR head 分支：既提供 submissions/ 数据，也是结果回写目标。
      - name: Checkout PR branch (submission data + write target)
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          path: pr-src

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps (from trusted requirements)
        run: pip install -r main-src/evaluation/requirements.txt

      - name: Detect changed submission dirs
        id: detect
        working-directory: pr-src
        run: |
          git remote add upstream https://github.com/${{ github.repository }}.git
          git fetch upstream ${{ github.event.pull_request.base.ref }} --depth=1
          changed=$(git diff --name-only upstream/${{ github.event.pull_request.base.ref }}..HEAD -- submissions/ \
            | awk -F/ '{print $1"/"$2}' | sort -u)
          echo "dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # 用 main 的脚本 + benchmark 评测 PR 的 submissions，结果写入 pr-src 以便回写 PR 分支。
      - name: Grade (recompute metrics)
        env:
          JUDGE_BASE_URL: ${{ secrets.JUDGE_BASE_URL }}
          JUDGE_API_KEY: ${{ secrets.JUDGE_API_KEY }}
          JUDGE_MODEL: ${{ secrets.JUDGE_MODEL }}
        run: |
          report_file=$(mktemp)
          for dir in ${{ steps.detect.outputs.dirs }}; do
            [ -d "pr-src/$dir" ] || continue
            sid=$(basename "$dir")
            python main-src/evaluation/grade.py \
              --submission "pr-src/$dir" \
              --benchmark main-src/benchmark/aacr_bench.jsonl \
              --out "pr-src/leaderboard/data/$sid.json" | tee -a "$report_file"
          done
          echo "REPORT_FILE=$report_file" >> "$GITHUB_ENV"

      - name: Commit metrics back to PR branch
        working-directory: pr-src
        run: |
          git config user.name "aacr-bench-bot"
          git config user.email "bot@users.noreply.github.com"
          git add leaderboard/data/*.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(eval): recomputed metrics for PR #${{ github.event.pull_request.number }}"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Comment metrics on PR
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.REPORT_FILE, 'utf8') || '（无复算输出）';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🏁 **复算结果**\n\n```\n" + body + "\n```",
            });
